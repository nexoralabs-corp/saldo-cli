version: 2

project_name: saldo

builds:
  - id: saldo
    main: ./cmd/saldo
    binary: saldo
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X saldo-cli/internal/cli.Version={{ .Version }}

archives:
  - id: saldo
    ids:
      - saldo
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

release:
  prerelease: auto
